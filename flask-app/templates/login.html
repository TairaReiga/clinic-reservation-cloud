{% extends "base.html" %}

{% block login_content %}
<div class="login-page">
  <div class="login-container">
    <div class="login-brand">
      <div class="logo-box">CM</div>
      <span class="app-name">クリニック管理システム</span>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          {% if category == 'error' %}
            <div class="flash-error">{{ message }}</div>
          {% endif %}
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form class="login-form" method="post">
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス <span class="required">*</span></label>
        <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">パスワード <span class="required">*</span></label>
        <div class="password-wrapper">
          <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="パスワード表示切替">
            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary">ログイン</button>
    </form>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
{% endblock %}
