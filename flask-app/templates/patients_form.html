{% extends "base.html" %}
{% set active_tab = 'patients' %}

{% block content %}
<div class="form-card-title">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </svg>
  患者を追加
</div>

<form method="post">
  <div class="form-grid-2">
    <div class="form-group">
      <label class="form-label" for="name">氏名 <span class="required">*</span></label>
      <input class="form-input" type="text" id="name" name="name" value="{{ name }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="phone">電話番号 <span class="required">*</span></label>
      <input class="form-input" type="text" id="phone" name="phone" value="{{ phone }}" required>
    </div>
  </div>

  <div class="form-actions">
    <a href="{{ url_for('main.patients_list') }}" class="btn-text">キャンセル</a>
    <button type="submit" class="btn-primary">保存</button>
  </div>
</form>
{% endblock %}
